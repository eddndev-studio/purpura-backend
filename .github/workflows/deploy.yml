name: deploy

# Despliegue a vps2 mediante el runner self-hosted de la org (label 'vps2'): el job corre EN la
# maquina, sin SSH ni secrets. Se dispara al publicar un tag vX.Y.Z o manualmente.
#
# El servidor ya esta aprovisionado (mismo patron que syle-api):
#   - usuario 'purpura', /opt/purpura/{bin,migrations}, /etc/purpura/purpura-backend.env (PORT=8091)
#   - postgres role+db 'purpura'; golang-migrate en /usr/local/bin
#   - unidad systemd 'purpura-backend'; vhost nginx api.purpura.eddn.dev -> 127.0.0.1:8091 + cert
#   - sudoers estrecho /etc/sudoers.d/purpura-deploy para github-runner:
#       systemctl restart/is-active purpura-backend, reload nginx, y /opt/purpura/bin/purpura-migrate
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vps2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, vps2]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: build linux/amd64 binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o dist/purpura-api ./cmd/api

      - name: install binary + migrations
        run: |
          install -m 0755 dist/purpura-api /opt/purpura/bin/purpura-api
          rsync -a --delete db/migrations/ /opt/purpura/migrations/

      - name: migrate + restart
        run: |
          sudo /opt/purpura/bin/purpura-migrate
          sudo systemctl restart purpura-backend
          sudo systemctl is-active purpura-backend

      - name: smoke check
        run: |
          for i in $(seq 1 15); do
            if curl -fsS https://api.purpura.eddn.dev/health >/dev/null 2>&1; then
              echo "health ok"; exit 0
            fi
            sleep 2
          done
          echo "health no respondio tras el despliegue"; exit 1
