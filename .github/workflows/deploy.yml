name: deploy

# Despliegue a vps2 (ssh). Se dispara al publicar un tag vX.Y.Z o manualmente.
# Requiere los siguientes secrets del repo/entorno (no se commitean):
#   VPS2_HOST     host o IP de vps2
#   VPS2_USER     usuario ssh con permiso de despliegue
#   VPS2_SSH_KEY  clave privada ssh (ed25519) del usuario de despliegue
# En el servidor se asume:
#   - /etc/purpura/purpura-backend.env  (variables del servicio, incl. DATABASE_URL)
#   - el binario 'migrate' (golang-migrate) instalado para aplicar migraciones
#   - una unidad systemd 'purpura-backend' (deploy/purpura-backend.service)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vps2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: build linux/amd64 binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o dist/purpura-api ./cmd/api

      - name: setup ssh
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS2_HOST }}" >> ~/.ssh/known_hosts

      - name: upload artifacts
        run: |
          rsync -az --delete \
            dist/purpura-api \
            db/migrations \
            deploy/purpura-backend.service \
            "${{ secrets.VPS2_USER }}@${{ secrets.VPS2_HOST }}:/opt/purpura/staging/"

      - name: migrate and restart
        run: |
          ssh "${{ secrets.VPS2_USER }}@${{ secrets.VPS2_HOST }}" bash -se <<'REMOTE'
          set -euo pipefail
          source /etc/purpura/purpura-backend.env
          # Aplicar migraciones (idempotente).
          migrate -path /opt/purpura/staging/migrations -database "$DATABASE_URL" up
          # Instalar binario y unidad, reiniciar servicio.
          sudo install -m 0755 /opt/purpura/staging/purpura-api /opt/purpura/purpura-api
          sudo install -m 0644 /opt/purpura/staging/purpura-backend.service /etc/systemd/system/purpura-backend.service
          sudo systemctl daemon-reload
          sudo systemctl restart purpura-backend
          sudo systemctl is-active purpura-backend
          REMOTE

      - name: smoke check
        run: |
          for i in $(seq 1 15); do
            if curl -fsS "https://${{ secrets.VPS2_HOST }}/health" >/dev/null 2>&1; then
              echo "health ok"; exit 0
            fi
            sleep 2
          done
          echo "health no respondio tras el despliegue"; exit 1
