name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: purpura
          POSTGRES_PASSWORD: purpura
          POSTGRES_DB: purpura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U purpura"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      GOFLAGS: -mod=readonly

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Archivos sin gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: sqlc drift check
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          sqlc generate
          if ! git diff --quiet -- internal/db; then
            echo "internal/db esta desactualizado: corre 'sqlc generate' y commitea"; git diff -- internal/db; exit 1
          fi

      - name: unit tests (race)
        run: go test -race ./...

      - name: integration tests
        env:
          TEST_DATABASE_URL: postgres://purpura:purpura@localhost:5432/purpura_test?sslmode=disable
        run: go test -tags=integration -p 1 ./...

      - name: build
        run: go build ./...
